<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --muted: #6b7280;
            --bg-color-1: #e2eafc;
            --bg-color-2: #f1f1f1;
            --bg-color-3: #e8f1ff;
            --bg-color-4: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(28, 28, 30, 0.6);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --muted: rgba(255, 255, 255, 0.65);
            }
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background:
                radial-gradient(at 0% 0%, var(--bg-color-1) 0, transparent 50%),
                radial-gradient(at 100% 0%, var(--bg-color-2) 0, transparent 50%),
                radial-gradient(at 100% 100%, var(--bg-color-3) 0, transparent 50%),
                radial-gradient(at 0% 100%, var(--bg-color-4) 0, transparent 50%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 18vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background 1.5s ease-in-out;
        }

        .top-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .widget-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.04);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            min-width: 86px;
            height: 42px;
            padding: 0 14px;
            box-sizing: border-box;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .widget-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.06);
        }

        .weather-trigger {
            appearance: none;
            -webkit-appearance: none;
            font: inherit;
            position: relative;
            cursor: pointer;
        }

        .weather-trigger::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            min-width: 180px;
            max-width: 260px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(17, 24, 39, 0.84);
            color: #fff;
            font-size: 12px;
            line-height: 1.5;
            text-align: left;
            white-space: pre-line;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
            z-index: 4;
        }

        .weather-trigger:hover::after,
        .weather-trigger:focus-visible::after {
            opacity: 1;
            transform: translateY(0);
        }

        #weather-display {
            font-size: 15px;
            font-weight: 600;
        }

        #time-display {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-variant-numeric: tabular-nums;
        }

        .container {
            width: 90%;
            max-width: 580px;
            text-align: center;
        }

        h1 {
            font-size: 72px;
            font-weight: 200;
            margin: 0 0 45px 0;
            letter-spacing: -4px;
            color: var(--text-main);
            opacity: 0.9;
        }

        .search-group {
            position: relative;
            margin-bottom: 25px;
        }

        .search-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px 20px;
            font-size: 19px;
            outline: none;
            color: var(--text-main);
        }

        .search-btn {
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (prefers-color-scheme: dark) {
            .search-btn {
                background: #f5f5f7;
                color: #1d1d1f;
            }
        }

        .engine-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: rgba(120, 120, 128, 0.1);
            border-radius: 16px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 30px;
        }

        .engine-tabs label {
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            color: #86868b;
            cursor: pointer;
            border-radius: 12px;
            text-align: center;
            transition: 0.2s;
            user-select: none;
        }

        .engine-tabs input {
            display: none;
        }

        .engine-tabs input:checked + label {
            color: var(--text-main);
            background: var(--glass-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #suggestions {
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 22px;
            display: none;
            list-style: none;
            padding: 10px 0;
            margin: 0;
            text-align: left;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
        }

        #suggestions li {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-main);
        }

        #suggestions li:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }

        .shortcut-item {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px 0;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .shortcut-item span:last-child {
            font-size: 11px;
            color: #86868b;
            font-weight: 600;
            margin-top: 5px;
        }

        .settings-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1200;
        }

        .settings-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            width: min(100%, 380px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
            text-align: left;
            color: var(--text-main);
        }

        .settings-panel h2 {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0;
        }

        .settings-panel p {
            margin: 0 0 20px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .settings-field {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .settings-field span {
            font-size: 13px;
            font-weight: 600;
        }

        .settings-field input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            font-size: 15px;
            border-radius: 16px;
            border: 1px solid rgba(120, 120, 128, 0.18);
            background: rgba(255, 255, 255, 0.32);
        }

        .settings-row {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .settings-row span {
            font-size: 13px;
            font-weight: 600;
        }

        .transport-tabs {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .transport-tabs input {
            display: none;
        }

        .transport-tabs label {
            padding: 12px 0;
            border-radius: 14px;
            background: rgba(120, 120, 128, 0.1);
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: 0.2s ease;
        }

        .transport-tabs input:checked + label {
            background: var(--text-main);
            color: #fff;
        }

        .settings-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 8px;
        }

        .settings-btn {
            border: none;
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .settings-btn.secondary {
            background: rgba(120, 120, 128, 0.12);
            color: var(--text-main);
        }

        .settings-btn.primary {
            background: var(--text-main);
            color: #fff;
        }

        .settings-note {
            margin-top: 14px;
            min-height: 18px;
            font-size: 12px;
            color: var(--muted);
        }

        @media (prefers-color-scheme: dark) {
            .settings-field input[type="text"] {
                background: rgba(28, 28, 30, 0.45);
                color: var(--text-main);
                border-color: rgba(255, 255, 255, 0.08);
            }

            .transport-tabs input:checked + label {
                background: #f5f5f7;
                color: #1d1d1f;
            }

            .settings-btn.primary {
                background: #f5f5f7;
                color: #1d1d1f;
            }
        }

        @media (max-width: 640px) {
            body {
                padding-top: 16vh;
            }

            .top-nav {
                top: 18px;
                left: 18px;
                right: 18px;
            }

            h1 {
                font-size: 56px;
                letter-spacing: -3px;
                margin-bottom: 32px;
            }

            .shortcuts-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .weather-trigger::after {
                left: auto;
                right: 0;
            }
        }
    </style>
</head>
<body>

<div class="top-nav">
    <button id="weather-display" class="widget-item weather-trigger" type="button" data-tip="加载中">⏳ ...</button>
    <div id="time-display" class="widget-item">00:00</div>
</div>

<div class="container">
    <h1>Search</h1>
    <div class="search-group">
        <div class="search-wrapper">
            <input type="text" id="q" placeholder="有什么可以帮到你？" autocomplete="off" autofocus>
            <button class="search-btn" onclick="s()">搜索</button>
        </div>
        <ul id="suggestions"></ul>
    </div>

    <div class="engine-tabs">
        <input type="radio" name="e" id="bd" value="bd"><label for="bd">Baidu</label>
        <input type="radio" name="e" id="gg" value="gg" checked><label for="gg">Google</label>
        <input type="radio" name="e" id="gpt" value="gpt"><label for="gpt">ChatGPT</label>
        <input type="radio" name="e" id="gm" value="gm"><label for="gm">Gemini</label>
    </div>

    <div class="shortcuts-grid">
        <a href="https://www.wenshushu.cn" target="_blank" class="shortcut-item"><span>📩</span><span>文叔叔</span></a>
        <a href="http://114.80.41.231:6088/sysn/view/init/login.ashx" target="_blank" class="shortcut-item"><span>☁️</span><span>宏云ERP</span></a>
        <a href="https://mp.weixin.qq.com" target="_blank" class="shortcut-item"><span>💬</span><span>公众号</span></a>
        <a href="https://www.xiaohongshu.com/explore" target="_blank" class="shortcut-item"><span>📕</span><span>小红书</span></a>
        <a href="https://www.jlc-erp.com/erp/#/workbench" target="_blank" class="shortcut-item"><span>📦</span><span>嘉立创</span></a>
    </div>
</div>

<div id="settings-modal" class="settings-modal" aria-hidden="true">
    <div class="settings-panel" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <h2 id="settings-title">左上角设置</h2>
        <p>单击切换天气和通勤，双击打开设置。天气区域会自动识别城市编码，通勤会校验起点终点。</p>

        <label class="settings-field">
            <span>区域天气</span>
            <input type="text" id="weather-region" placeholder="例如：昆山">
        </label>

        <label class="settings-field">
            <span>通勤起点</span>
            <input type="text" id="commute-start" placeholder="例如：昆山南站">
        </label>

        <label class="settings-field">
            <span>通勤终点</span>
            <input type="text" id="commute-end" placeholder="例如：花桥办公室">
        </label>

        <div class="settings-row">
            <span>通勤方式</span>
            <div class="transport-tabs">
                <input type="radio" name="transport-mode" id="mode-driving" value="driving" checked><label for="mode-driving">驾车</label>
                <input type="radio" name="transport-mode" id="mode-transit" value="transit"><label for="mode-transit">公交</label>
                <input type="radio" name="transport-mode" id="mode-riding" value="riding"><label for="mode-riding">骑行</label>
            </div>
        </div>

        <div class="settings-actions">
            <button id="settings-cancel" class="settings-btn secondary" type="button">取消</button>
            <button id="settings-save" class="settings-btn primary" type="button">保存</button>
        </div>
        <div id="settings-note" class="settings-note"></div>
    </div>
</div>

<script>
    const AMAP_KEY = '332f5b64fc814a3ded62a85df1f26d6d';
    const SEARCH_ENGINE_STORAGE_KEY = 'preferred-search-engine';
    const WIDGET_SETTINGS_STORAGE_KEY = 'widget-settings';
    const SUGGESTION_CALLBACK_PREFIX = 'showSug';
    const DEFAULT_WIDGET_SETTINGS = {
        weatherRegion: '昆山',
        cityCode: '320583',
        commuteStart: '',
        commuteEnd: '',
        commuteStartLocation: '',
        commuteEndLocation: '',
        transportMode: 'driving',
        widgetView: 'weather'
    };
    const CACHE_TTL = {
        weather: 30 * 60 * 1000,
        route: 5 * 60 * 1000,
        geocode: 12 * 60 * 60 * 1000
    };
    const COMMUTE_WINDOWS = {
        morning: { start: 7 * 60, end: 9 * 60 },
        evening: { start: 16 * 60 + 30, end: 20 * 60 }
    };

    const input = document.getElementById('q');
    const sugBox = document.getElementById('suggestions');
    const weatherDisplay = document.getElementById('weather-display');
    const settingsModal = document.getElementById('settings-modal');
    const regionInput = document.getElementById('weather-region');
    const commuteStartInput = document.getElementById('commute-start');
    const commuteEndInput = document.getElementById('commute-end');
    const settingsNote = document.getElementById('settings-note');
    const saveButton = document.getElementById('settings-save');

    let widgetSettings = loadWidgetSettings();
    let weatherCache = { value: null, time: 0 };
    let routeCache = new Map();
    let geocodeCache = new Map();
    let suggestionTimer = null;
    let currentSuggestionCallback = null;
    let singleClickTimer = null;
    let manualWidgetOverride = false;
    let lastScheduledView = '';

    function loadWidgetSettings() {
        try {
            const saved = JSON.parse(localStorage.getItem(WIDGET_SETTINGS_STORAGE_KEY));
            return { ...DEFAULT_WIDGET_SETTINGS, ...saved };
        } catch (e) {
            return { ...DEFAULT_WIDGET_SETTINGS };
        }
    }

    function persistWidgetSettings() {
        localStorage.setItem(WIDGET_SETTINGS_STORAGE_KEY, JSON.stringify(widgetSettings));
    }

    function setTheme(weather) {
        const root = document.documentElement;
        let colors;

        if (weather.includes('晴')) {
            colors = ['#e2eafc', '#fff9db', '#e8f1ff', '#ffffff'];
        } else if (weather.includes('云')) {
            colors = ['#e2eafc', '#f1f1f1', '#e8f1ff', '#ffffff'];
        } else if (weather.includes('阴')) {
            colors = ['#cfd9df', '#e2ebf0', '#ececec', '#f5f7fa'];
        } else if (weather.includes('雨') || weather.includes('雪')) {
            colors = ['#a1c4fd', '#c2e9fb', '#d1d6e6', '#e1eec3'];
        } else {
            colors = ['#e2eafc', '#f1f1f1', '#e8f1ff', '#ffffff'];
        }

        root.style.setProperty('--bg-color-1', colors[0]);
        root.style.setProperty('--bg-color-2', colors[1]);
        root.style.setProperty('--bg-color-3', colors[2]);
        root.style.setProperty('--bg-color-4', colors[3]);
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('time-display').innerText =
            String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    function restoreEngineSelection() {
        const savedEngine = localStorage.getItem(SEARCH_ENGINE_STORAGE_KEY);
        if (!savedEngine) return;
        const savedInput = document.getElementById(savedEngine);
        if (savedInput && savedInput.name === 'e') savedInput.checked = true;
    }

    function persistEngineSelection() {
        const selectedEngine = document.querySelector('input[name="e"]:checked');
        if (selectedEngine) localStorage.setItem(SEARCH_ENGINE_STORAGE_KEY, selectedEngine.id);
    }

    function getCurrentCommuteLabel() {
        const minutes = new Date().getHours() * 60 + new Date().getMinutes();
        if (minutes >= COMMUTE_WINDOWS.morning.start && minutes <= COMMUTE_WINDOWS.morning.end) return '上班';
        if (minutes >= COMMUTE_WINDOWS.evening.start && minutes <= COMMUTE_WINDOWS.evening.end) return '下班';
        return '通勤';
    }

    function getCommuteDirection() {
        const minutes = new Date().getHours() * 60 + new Date().getMinutes();
        const isMorning = minutes < 12 * 60;
        return isMorning ? 'forward' : 'reverse';
    }

    function setWidgetTooltip(lines) {
        weatherDisplay.setAttribute('data-tip', lines.filter(Boolean).join('\n'));
    }

    function syncWidgetTooltip(statusText = '') {
        const routeText = widgetSettings.commuteStart && widgetSettings.commuteEnd
            ? `${widgetSettings.commuteStart} -> ${widgetSettings.commuteEnd}`
            : '未设置通勤路线';
        setWidgetTooltip([
            `区域天气: ${widgetSettings.weatherRegion}`,
            `通勤路线: ${routeText}`,
            `通勤方式: ${transportLabel(widgetSettings.transportMode)}`,
            statusText || '单击切换天气/通勤，双击打开设置'
        ]);
    }

    function transportLabel(mode) {
        const map = { driving: '驾车', transit: '公交', riding: '骑行' };
        return map[mode] || '驾车';
    }

    function getSelectedTransportMode() {
        return document.querySelector('input[name="transport-mode"]:checked').value;
    }

    function setSelectedTransportMode(mode) {
        const target = document.querySelector(`input[name="transport-mode"][value="${mode}"]`);
        if (target) target.checked = true;
    }

    async function geocodeAddress(address, cityHint = '') {
        const cacheKey = `${cityHint}|${address}`;
        const cached = geocodeCache.get(cacheKey);
        if (cached && Date.now() - cached.time < CACHE_TTL.geocode) return cached.value;

        const res = await fetch(`https://restapi.amap.com/v3/geocode/geo?address=${encodeURIComponent(address)}&city=${encodeURIComponent(cityHint)}&key=${AMAP_KEY}`);
        const data = await res.json();
        const first = data.geocodes && data.geocodes[0];
        if (!first || !first.location) throw new Error('No geocode result');

        const value = {
            formattedAddress: first.formatted_address || address,
            location: first.location,
            adcode: first.adcode || ''
        };
        geocodeCache.set(cacheKey, { value, time: Date.now() });
        return value;
    }

    async function normalizeSettingsDraft(regionName, startName, endName, transportMode) {
        const normalizedRegion = await geocodeAddress(regionName);
        const next = {
            weatherRegion: normalizedRegion.formattedAddress || regionName,
            cityCode: normalizedRegion.adcode || widgetSettings.cityCode,
            commuteStart: '',
            commuteEnd: '',
            commuteStartLocation: '',
            commuteEndLocation: '',
            transportMode,
            widgetView: widgetSettings.widgetView
        };

        if (startName && endName) {
            const [startGeo, endGeo] = await Promise.all([
                geocodeAddress(startName, next.weatherRegion),
                geocodeAddress(endName, next.weatherRegion)
            ]);
            next.commuteStart = startGeo.formattedAddress || startName;
            next.commuteEnd = endGeo.formattedAddress || endName;
            next.commuteStartLocation = startGeo.location;
            next.commuteEndLocation = endGeo.location;
        }

        return next;
    }

    function formatDuration(seconds) {
        const minutes = Math.max(1, Math.round(seconds / 60));
        if (minutes >= 60) {
            const hours = Math.floor(minutes / 60);
            const rest = minutes % 60;
            return rest ? `${hours}h${rest}m` : `${hours}h`;
        }
        return `${minutes}分`;
    }

    async function fetchWeather(force = false) {
        if (!force && weatherCache.value && Date.now() - weatherCache.time < CACHE_TTL.weather) {
            return weatherCache.value;
        }

        const icons = { '晴': '☀️', '多云': '🌤️', '阴': '☁️', '雨': '🌧️', '雷阵雨': '⛈️', '雪': '❄️' };
        const res = await fetch(`https://restapi.amap.com/v3/weather/weatherInfo?city=${widgetSettings.cityCode}&key=${AMAP_KEY}`);
        const data = await res.json();
        if (!(data.status === '1' && data.lives && data.lives[0])) {
            throw new Error('No weather result');
        }

        const live = data.lives[0];
        const weatherInfo = {
            label: `${icons[live.weather] || '🌤️'} ${live.temperature}°`,
            detail: `${live.city || widgetSettings.weatherRegion} ${live.weather}`,
            weather: live.weather,
            city: live.city || widgetSettings.weatherRegion
        };
        weatherCache = { value: weatherInfo, time: Date.now() };
        widgetSettings.weatherRegion = weatherInfo.city;
        persistWidgetSettings();
        setTheme(live.weather);
        return weatherInfo;
    }

    async function fetchRoute(force = false) {
        if (!widgetSettings.commuteStartLocation || !widgetSettings.commuteEndLocation) {
            throw new Error('Commute not configured');
        }

        const label = getCurrentCommuteLabel();
        const direction = getCommuteDirection();
        const routeKey = `${widgetSettings.transportMode}|${direction}|${widgetSettings.commuteStartLocation}|${widgetSettings.commuteEndLocation}|${widgetSettings.cityCode}`;
        const cached = routeCache.get(routeKey);
        if (!force && cached && Date.now() - cached.time < CACHE_TTL.route) {
            return cached.value;
        }

        const forwardOrigin = widgetSettings.commuteStartLocation;
        const forwardDestination = widgetSettings.commuteEndLocation;
        const origin = direction === 'forward' ? forwardOrigin : forwardDestination;
        const destination = direction === 'forward' ? forwardDestination : forwardOrigin;

        let durationSeconds = 0;
        if (widgetSettings.transportMode === 'driving') {
            const res = await fetch(`https://restapi.amap.com/v3/direction/driving?origin=${origin}&destination=${destination}&strategy=0&key=${AMAP_KEY}`);
            const data = await res.json();
            const path = data.route && data.route.paths && data.route.paths[0];
            if (!path || !path.duration) throw new Error('No driving route');
            durationSeconds = Number(path.duration);
        } else if (widgetSettings.transportMode === 'transit') {
            const res = await fetch(`https://restapi.amap.com/v3/direction/transit/integrated?origin=${origin}&destination=${destination}&city=${widgetSettings.cityCode}&cityd=${widgetSettings.cityCode}&strategy=0&key=${AMAP_KEY}`);
            const data = await res.json();
            const transit = data.route && data.route.transits && data.route.transits[0];
            if (!transit || !transit.duration) throw new Error('No transit route');
            durationSeconds = Number(transit.duration);
        } else {
            const res = await fetch(`https://restapi.amap.com/v4/direction/bicycling?origin=${origin}&destination=${destination}&key=${AMAP_KEY}`);
            const data = await res.json();
            const path = data.data && data.data.paths && data.data.paths[0];
            if (!path || !path.duration) throw new Error('No riding route');
            durationSeconds = Number(path.duration);
        }

        const value = {
            label: `${label} ${formatDuration(durationSeconds)}`,
            detail: `${transportLabel(widgetSettings.transportMode)} ${widgetSettings.commuteStart} -> ${widgetSettings.commuteEnd}`
        };
        routeCache.set(routeKey, { value, time: Date.now() });
        return value;
    }

    async function renderWidget(force = false) {
        const currentView = widgetSettings.widgetView;
        if (currentView === 'commute') {
            try {
                const route = await fetchRoute(force);
                weatherDisplay.innerText = route.label;
                syncWidgetTooltip(route.detail);
                return;
            } catch (e) {
                try {
                    const weather = await fetchWeather(force);
                    weatherDisplay.innerText = weather.label;
                    syncWidgetTooltip(`通勤失败，已切回天气\n${weather.detail}`);
                    return;
                } catch (weatherError) {
                    weatherDisplay.innerText = '天气 --';
                    syncWidgetTooltip('通勤失败，天气也暂时不可用');
                    return;
                }
            }
        }

        try {
            const weather = await fetchWeather(force);
            weatherDisplay.innerText = weather.label;
            syncWidgetTooltip(weather.detail);
        } catch (e) {
            weatherDisplay.innerText = '天气 --';
            syncWidgetTooltip('天气暂时不可用');
        }
    }

    function getScheduledWidgetView() {
        const minutes = new Date().getHours() * 60 + new Date().getMinutes();
        if (
            (minutes >= COMMUTE_WINDOWS.morning.start && minutes <= COMMUTE_WINDOWS.morning.end) ||
            (minutes >= COMMUTE_WINDOWS.evening.start && minutes <= COMMUTE_WINDOWS.evening.end)
        ) {
            return widgetSettings.commuteStartLocation && widgetSettings.commuteEndLocation ? 'commute' : 'weather';
        }
        return 'weather';
    }

    function syncWidgetViewWithSchedule() {
        const scheduledView = getScheduledWidgetView();
        const scheduleChanged = scheduledView !== lastScheduledView;

        if (scheduleChanged) {
            manualWidgetOverride = false;
            lastScheduledView = scheduledView;
        }

        if (!manualWidgetOverride) {
            widgetSettings.widgetView = scheduledView;
        }
    }

    function openSettings() {
        regionInput.value = widgetSettings.weatherRegion;
        commuteStartInput.value = widgetSettings.commuteStart;
        commuteEndInput.value = widgetSettings.commuteEnd;
        setSelectedTransportMode(widgetSettings.transportMode);
        settingsNote.innerText = '';
        settingsModal.classList.add('is-open');
        settingsModal.setAttribute('aria-hidden', 'false');
        regionInput.focus();
        regionInput.select();
    }

    function closeSettings() {
        settingsModal.classList.remove('is-open');
        settingsModal.setAttribute('aria-hidden', 'true');
        settingsNote.innerText = '';
    }

    async function saveWidgetSettings() {
        const regionName = regionInput.value.trim();
        const startName = commuteStartInput.value.trim();
        const endName = commuteEndInput.value.trim();
        const transportMode = getSelectedTransportMode();

        if (!regionName) {
            settingsNote.innerText = '请先填写区域天气。';
            regionInput.focus();
            return;
        }

        if ((startName && !endName) || (!startName && endName)) {
            settingsNote.innerText = '通勤起点和终点需要一起填写。';
            (!startName ? commuteStartInput : commuteEndInput).focus();
            return;
        }

        saveButton.disabled = true;
        saveButton.innerText = '保存中...';
        settingsNote.innerText = '正在校验区域和路线...';

        try {
            const nextSettings = await normalizeSettingsDraft(regionName, startName, endName, transportMode);
            widgetSettings = nextSettings;
            if (!widgetSettings.widgetView) widgetSettings.widgetView = getScheduledWidgetView();
            persistWidgetSettings();
            weatherCache = { value: null, time: 0 };
            routeCache.clear();
            manualWidgetOverride = false;
            lastScheduledView = getScheduledWidgetView();
            syncWidgetTooltip('设置已保存');
            closeSettings();
            await renderWidget(true);
        } catch (e) {
            settingsNote.innerText = '保存失败，请检查区域或起终点是否可识别。';
        } finally {
            saveButton.disabled = false;
            saveButton.innerText = '保存';
        }
    }

    function toggleWidgetView() {
        manualWidgetOverride = true;
        widgetSettings.widgetView = widgetSettings.widgetView === 'weather' ? 'commute' : 'weather';
        persistWidgetSettings();
        renderWidget(true);
    }

    function createSuggestionItem(text) {
        const li = document.createElement('li');
        li.textContent = text;
        li.addEventListener('click', () => {
            input.value = text;
            sugBox.style.display = 'none';
            s();
        });
        return li;
    }

    function clearSuggestionCallback() {
        if (currentSuggestionCallback && window[currentSuggestionCallback]) {
            delete window[currentSuggestionCallback];
        }
        currentSuggestionCallback = null;
    }

    function requestSuggestions(keyword) {
        clearSuggestionCallback();
        currentSuggestionCallback = `${SUGGESTION_CALLBACK_PREFIX}_${Date.now()}`;
        window[currentSuggestionCallback] = (data) => {
            sugBox.innerHTML = '';
            const list = Array.isArray(data.s) ? data.s.slice(0, 6) : [];
            if (!list.length) {
                sugBox.style.display = 'none';
                clearSuggestionCallback();
                return;
            }
            list.forEach((item) => sugBox.appendChild(createSuggestionItem(item)));
            sugBox.style.display = 'block';
            clearSuggestionCallback();
        };

        const script = document.createElement('script');
        script.src = `https://suggestion.baidu.com/su?wd=${encodeURIComponent(keyword)}&cb=${currentSuggestionCallback}`;
        script.onload = script.onerror = () => {
            script.remove();
        };
        document.body.appendChild(script);
    }

    function s() {
        const txt = input.value.trim();
        if (!txt) return;
        const engine = document.querySelector('input[name="e"]:checked').id;
        const urls = {
            bd: `https://www.baidu.com/s?wd=${encodeURIComponent(txt)}`,
            gg: `https://www.google.com/search?q=${encodeURIComponent(txt)}`,
            gpt: `https://chatgpt.com/?q=${encodeURIComponent(txt)}`,
            gm: `https://gemini.google.com/app?q=${encodeURIComponent(txt)}`
        };
        window.open(urls[engine], '_blank');
    }

    window.onload = () => {
        restoreEngineSelection();
        syncWidgetViewWithSchedule();
        syncWidgetTooltip();
        updateTime();
        renderWidget(true);

        setInterval(updateTime, 1000);
        setInterval(() => {
            syncWidgetViewWithSchedule();
            renderWidget(false);
        }, 60000);

        const engineUrls = {
            bd: 'https://www.baidu.com',
            gg: 'https://www.google.com',
            gpt: 'https://chatgpt.com',
            gm: 'https://gemini.google.com'
        };
        document.querySelectorAll('.engine-tabs label').forEach((label) => {
            let last = 0;
            label.addEventListener('click', (e) => {
                const now = Date.now();
                if (now - last < 300) {
                    e.preventDefault();
                    window.open(engineUrls[label.getAttribute('for')], '_blank');
                }
                last = now;
            });
        });

        document.querySelectorAll('input[name="e"]').forEach((engineInput) => {
            engineInput.addEventListener('change', persistEngineSelection);
        });

        weatherDisplay.addEventListener('click', () => {
            if (singleClickTimer) return;
            singleClickTimer = setTimeout(() => {
                toggleWidgetView();
                singleClickTimer = null;
            }, 220);
        });

        weatherDisplay.addEventListener('dblclick', () => {
            if (singleClickTimer) {
                clearTimeout(singleClickTimer);
                singleClickTimer = null;
            }
            openSettings();
        });

        document.getElementById('settings-save').addEventListener('click', saveWidgetSettings);
        document.getElementById('settings-cancel').addEventListener('click', closeSettings);
        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) closeSettings();
        });
    };

    input.addEventListener('input', () => {
        const value = input.value.trim();
        clearTimeout(suggestionTimer);
        if (!value) {
            sugBox.style.display = 'none';
            clearSuggestionCallback();
            return;
        }
        suggestionTimer = setTimeout(() => requestSuggestions(value), 180);
    });

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') s();
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-group')) sugBox.style.display = 'none';
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && settingsModal.classList.contains('is-open')) {
            closeSettings();
        }
    });
</script>
</body>
</html>
