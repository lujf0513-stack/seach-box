<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Search</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔍</text></svg>">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.42);
            --glass-border: rgba(255, 255, 255, 0.34);
            --text-main: #1d1d1f;
            --muted: #6b7280;
            --bg-color-1: #e2eafc;
            --bg-color-2: #f1f1f1;
            --bg-color-3: #e8f1ff;
            --bg-color-4: #ffffff;
            --weather-overlay: rgba(255, 255, 255, 0.2);
            --weather-glow-1: rgba(255, 255, 255, 0.34);
            --weather-glow-2: rgba(255, 255, 255, 0.18);
            --weather-shadow: rgba(15, 23, 42, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(28, 28, 30, 0.6);
                --glass-border: rgba(255, 255, 255, 0.1);
                --text-main: #ffffff;
                --muted: rgba(255, 255, 255, 0.65);
                --weather-glow-1: rgba(255, 255, 255, 0.08);
                --weather-glow-2: rgba(255, 255, 255, 0.04);
                --weather-shadow: rgba(0, 0, 0, 0.28);
            }
        }

        body {
            position: relative;
            margin: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            background:
                radial-gradient(circle at 14% 16%, var(--bg-color-1) 0, transparent 34%),
                radial-gradient(circle at 82% 18%, var(--bg-color-2) 0, transparent 36%),
                radial-gradient(circle at 84% 84%, var(--bg-color-3) 0, transparent 34%),
                radial-gradient(circle at 12% 88%, var(--bg-color-4) 0, transparent 36%),
                linear-gradient(145deg, rgba(255, 255, 255, 0.42), rgba(255, 255, 255, 0.08));
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 18vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            transition: background 1.5s ease-in-out, filter 1s ease-in-out;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        body::after {
            background:
                linear-gradient(180deg, var(--weather-overlay), rgba(255, 255, 255, 0.06)),
                radial-gradient(circle at 18% 14%, var(--weather-glow-1), transparent 34%),
                radial-gradient(circle at 78% 22%, var(--weather-glow-2), transparent 30%),
                radial-gradient(circle at 50% 100%, rgba(255, 255, 255, 0.16), transparent 42%),
                linear-gradient(135deg, rgba(255, 255, 255, 0.12), transparent 56%);
            mix-blend-mode: soft-light;
            backdrop-filter: blur(6px) saturate(1.08);
            -webkit-backdrop-filter: blur(6px) saturate(1.08);
            z-index: -1;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 50%, transparent 48%, var(--weather-shadow) 100%);
            opacity: 0.9;
            z-index: -1;
        }

        .top-nav {
            position: fixed;
            top: 30px;
            left: 30px;
            right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .widget-item {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-main);
            min-width: 86px;
            height: 42px;
            padding: 0 14px;
            box-sizing: border-box;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .widget-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
        }

        .weather-trigger {
            appearance: none;
            -webkit-appearance: none;
            font: inherit;
            position: relative;
            cursor: pointer;
        }

        .weather-trigger::after {
            content: attr(data-tip);
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            min-width: 180px;
            max-width: 260px;
            padding: 10px 12px;
            border-radius: 16px;
            background: rgba(17, 24, 39, 0.84);
            color: #fff;
            font-size: 12px;
            line-height: 1.5;
            text-align: left;
            white-space: pre-line;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.2);
            z-index: 4;
        }

        .weather-trigger:hover::after,
        .weather-trigger:focus-visible::after {
            opacity: 1;
            transform: translateY(0);
        }

        #weather-display {
            font-size: 15px;
            font-weight: 600;
        }

        #time-display {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-variant-numeric: tabular-nums;
        }

        .container {
            width: 90%;
            max-width: 580px;
            text-align: center;
        }

        h1 {
            font-size: 72px;
            font-weight: 200;
            margin: 0 0 45px 0;
            letter-spacing: -4px;
            color: var(--text-main);
            opacity: 0.9;
        }

        .search-group {
            position: relative;
            margin-bottom: 25px;
        }

        .search-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px;
            display: flex;
            align-items: center;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.1);
            transition: 0.3s;
        }

        input[type="text"] {
            flex: 1;
            border: none;
            background: transparent;
            padding: 15px 20px;
            font-size: 19px;
            outline: none;
            color: var(--text-main);
        }

        .search-btn {
            background: var(--text-main);
            color: #fff;
            border: none;
            padding: 12px 28px;
            border-radius: 18px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        @media (prefers-color-scheme: dark) {
            .search-btn {
                background: #f5f5f7;
                color: #1d1d1f;
            }
        }

        .engine-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background: rgba(120, 120, 128, 0.1);
            border-radius: 16px;
            padding: 4px;
            gap: 4px;
            margin-bottom: 30px;
        }

        .engine-tabs label {
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            color: #86868b;
            cursor: pointer;
            border-radius: 12px;
            text-align: center;
            transition: 0.2s;
            user-select: none;
        }

        .engine-tabs input {
            display: none;
        }

        .engine-tabs input:checked + label {
            color: var(--text-main);
            background: var(--glass-bg);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        #suggestions {
            position: absolute;
            top: 105%;
            left: 0;
            width: 100%;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border-radius: 22px;
            display: none;
            list-style: none;
            padding: 10px 0;
            margin: 0;
            text-align: left;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow: 0 20px 42px rgba(15, 23, 42, 0.1);
        }

        #suggestions li {
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            color: var(--text-main);
        }

        #suggestions li:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            position: relative;
        }

        .shortcut-item {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px 0;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        }

        .shortcut-item span:last-child {
            font-size: 11px;
            color: #86868b;
            font-weight: 600;
            margin-top: 5px;
        }

        .shortcut-item.dropdown-wrapper {
            padding: 0;
            position: relative;
        }

        .dropdown-wrapper .dropdown-toggle {
            width: 100%;
            height: 100%;
            padding: 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: inherit;
            color: inherit;
            background: transparent;
            border: none;
            cursor: pointer;
            appearance: none;
            transition: transform 0.22s ease, filter 0.22s ease;
        }

        .dropdown-wrapper .dropdown-toggle span {
            margin: 0;
        }

        .dropdown-wrapper .dropdown-toggle span:first-child {
            font-size: 24px;
            margin-bottom: 2px;
        }

        .dropdown-wrapper .dropdown-toggle span:last-child {
            font-size: 11px;
            color: #86868b;
            font-weight: 600;
            margin-top: 3px;
        }

        .dropdown-wrapper.is-open .dropdown-toggle {
            transform: translateY(-1px);
            filter: saturate(1.04);
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%) translateY(-6px) scale(0.98);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            padding: 14px;
            list-style: none;
            margin: 0;
            width: min(680px, calc(100vw - 36px));
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 8px;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform-origin: top center;
            transition: opacity 0.24s ease, transform 0.28s ease, visibility 0.28s ease;
        }

        .dropdown-menu.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0) scale(1);
        }

        .dropdown-menu li {
            margin: 0;
            min-width: 0;
        }

        .dropdown-menu li a {
            width: 100%;
            min-height: 72px;
            box-sizing: border-box;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 12px 0;
            color: var(--text-main);
            text-align: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
            transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
        }

        .dropdown-menu li a:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.1);
        }

        .dropdown-menu .menu-icon {
            font-size: 24px;
            line-height: 1;
            margin-bottom: 6px;
        }

        .dropdown-menu .menu-label {
            font-size: 11px;
            line-height: 1.35;
            font-weight: 600;
            color: #86868b;
            word-break: break-word;
            padding: 0 4px;
        }

        .settings-modal {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            z-index: 1200;
        }

        .settings-modal.is-open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-panel {
            width: min(100%, 380px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 26px 70px rgba(15, 23, 42, 0.18);
            text-align: left;
            color: var(--text-main);
        }

        .settings-panel h2 {
            margin: 0 0 6px;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 0;
        }

        .settings-panel p {
            margin: 0 0 20px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .settings-field {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .settings-field span {
            font-size: 13px;
            font-weight: 600;
        }

        .settings-field input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            font-size: 15px;
            border-radius: 16px;
            border: 1px solid rgba(120, 120, 128, 0.18);
            background: rgba(255, 255, 255, 0.32);
        }

        .settings-row {
            display: grid;
            gap: 8px;
            margin-bottom: 16px;
        }

        .settings-row span {
            font-size: 13px;
            font-weight: 600;
        }

        .transport-tabs {
